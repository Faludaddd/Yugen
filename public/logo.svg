<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="yugenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b5a8ff"/>
      <stop offset="100%" stop-color="#595991"/>
    </linearGradient>
    <linearGradient id="yugenGradInner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4ccff"/>
      <stop offset="100%" stop-color="#7a6db8"/>
    </linearGradient>
    <radialGradient id="yugenGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#b5a8ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b5a8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="256" cy="256" r="240" fill="url(#yugenGlow)"/>

  <!-- Outer ring (portal) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#yugenGrad)" stroke-width="14" opacity="0.85"/>

  <!-- Inner crescent moon shape (the "Y" formed by negative space) -->
  <path d="M 256 96
           C 200 96 160 140 160 200
           C 160 240 180 270 210 285
           C 180 300 160 330 160 370
           C 160 410 200 416 256 416
           M 256 96
           C 312 96 352 140 352 200
           C 352 240 332 270 302 285
           C 332 300 352 330 352 370
           C 352 410 312 416 256 416"
        fill="none" stroke="url(#yugenGradInner)" stroke-width="18" stroke-linecap="round"/>

  <!-- Play triangle (formed in the center negative space) -->
  <path d="M 232 200 L 296 256 L 232 312 Z" fill="url(#yugenGrad)" opacity="0.95"/>

  <!-- Top accent dot (the "third eye" / star) -->
  <circle cx="256" cy="72" r="6" fill="#d4ccff"/>

  <!-- Bottom accent dot -->
  <circle cx="256" cy="440" r="6" fill="#d4ccff" opacity="0.6"/>
</svg>
