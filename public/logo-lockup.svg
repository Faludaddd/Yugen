<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <linearGradient id="lockupGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b5a8ff"/>
      <stop offset="100%" stop-color="#595991"/>
    </linearGradient>
    <linearGradient id="lockupGradInner" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4ccff"/>
      <stop offset="100%" stop-color="#7a6db8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b5a8ff"/>
    </linearGradient>
  </defs>

  <!-- Icon (left, scaled to 200x200) -->
  <g transform="translate(0, 0)">
    <circle cx="100" cy="100" r="90" fill="none" stroke="url(#lockupGrad)" stroke-width="7" opacity="0.85"/>
    <path d="M 100 30
             C 75 30 60 50 60 75
             C 60 90 68 102 80 108
             C 68 114 60 126 60 141
             C 60 156 75 158 100 158
             M 100 30
             C 125 30 140 50 140 75
             C 140 90 132 102 120 108
             C 132 114 140 126 140 141
             C 140 156 125 158 100 158"
          fill="none" stroke="url(#lockupGradInner)" stroke-width="9" stroke-linecap="round"/>
    <path d="M 90 75 L 120 100 L 90 125 Z" fill="url(#lockupGrad)" opacity="0.95"/>
    <circle cx="100" cy="22" r="3" fill="#d4ccff"/>
    <circle cx="100" cy="178" r="3" fill="#d4ccff" opacity="0.6"/>
  </g>

  <!-- Wordmark (right) -->
  <text x="220" y="125" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="84" font-weight="800" letter-spacing="-2" fill="url(#textGrad)">
    Yugen
  </text>

  <!-- Subtle tagline -->
  <text x="222" y="158" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
        font-size="14" font-weight="500" letter-spacing="6" fill="#696969" text-transform="uppercase">
    ANIME • STREAM
  </text>
</svg>
